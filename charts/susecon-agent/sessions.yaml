  - id: "BUSINESS-1337"
    title: "Navigating the EU AI Act: What Open Source Builders and Users Must Know About Risk and Compliance"
    speaker: "Damián Palašta, Miloš Pokrivčák"
    abstract: >
      The EU AI Act already shapes how AI systems—including open-source models and tools—can be developed, shared, and deployed. Yet the obligations, exemptions, and new risk categories often remain misunderstood, especially in open-source communities where development models differ fundamentally from commercial vendors.

      This session clarifies when open-source AI is exempt, when obligations do apply, and how risk levels (prohibited, high-risk, limited-risk, minimal-risk) translate into real responsibilities for developers, contributors, maintainers, platform providers, and enterprise users.

      Attendees will learn where the boundaries lie, which practices are allowed or prohibited, how “placing on the market” vs. “free release” matters, and how organizations can adopt compliant workflows without undermining openness or innovation. Practical examples illustrate compliance strategies, governance approaches, and common misunderstandings.
    track: Business Insights
    day: "Tuesday"
    date: "2026-04-21"
    time: "12:30"
    end_time: "13:00"
    room: Palmovka 3
    length: 30
    tags: ["open-source", "ai"]

