  - id: "HOL-1434"
    title: Remote Host Onboarding with SUSE Edge
    speaker: Pete Hakkarainen
    abstract: >
      SUSE Edge provides three different cluster provisioning methods. One of them is called Phonehome Provisioning, where the SUSE Edge Management Cluster has SUSE Rancher Prime deployed and with Elemental it allows Kubernetes clusters in remote locations to be provisioned with remote onboarding.

      For the downstream cluster nodes, a bootable ISO disk image is created with Edge Image Builder based on the yaml manifest which contains the Elemental component configuration. Once the remote node is booted with the ISO, SUSE Linux Micro operating system is bootstrapped, and an Elemental Agent is deployed to the node. The agent runs and registers to Elemental by “phoning home”. After the node registration, SUSE Rancher Prime can be used to provision Kubernetes clusters on the nodes.

      In this hands-on session new cluster nodes will be bootstrapped with a bootable disk image created by Edge Image Builder. Then SUSE Rancher Prime and Elemental will be used to provision Kubernetes to the registered cluster nodes.
    track: Hands on Lab
    day: "Wednesday"
