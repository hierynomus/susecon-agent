  - id: "TUTORIAL-1172"
    title: SUSE Virtualization on PRIMERGY — Simplified by the Deployment Engine
    speaker: "Mark Gonnelly, João Correia"
    abstract: >
      Greenfield bare metal builds drive high effort especially in edge and lights out datacenter environments. Repeatability and consistency are key. Tools exist to expand environments, challenges arise when starting from scratch.
      Our lightweight Deployment Engine based on SLE Micro (6.1) automates both SUSE Virtualization and bare metal SLE Micro deployments for onward use as bare metal SUSE Rancher Prime hosts. The deployment engine ships as a single qcow2 image and contains installation files for both SUSE Virtualization and SLE Micro to allow a disconnected build.
      Configuration is controlled by two text files (environmental data/per physical server information) used to build SUSE Virtualization yaml, SLE Micro Ignition files and iPXE configuration. Servers are managed via IPMI to control PXE boot.
