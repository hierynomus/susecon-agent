    speaker: Andy Wirtz
    abstract: >
      Organizations with strict compliance requirements often adopt a “Cluster-as-a-Service” model for Kubernetes to ensure hard isolation between workloads. While this approach satisfies auditors, it can create an operational nightmare—manual provisioning, multiple teams, and weeks of delays.

