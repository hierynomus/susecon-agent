      With the well-known pricing changes from Broadcom/VMware, we are forced to look into new hypervisor technologies/products, and in doing so we noticed SUSE Harvester/Virtualization. In this session, we will go over the path we took to set up Harvester and migrate to it. We'll cover some nice-to-haves we found, but also a few issues we ran into. To top it off, we will also talk about how we automated the setup of new VMs and introduce two new tools we developed (both are open source and available to the community) that made our lives easier.
