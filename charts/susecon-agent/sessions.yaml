    title: "S(US)ELinux: The new default mandatory access control system"
    speaker: Johannes Segitz
    abstract: >
      SUSE has been using AppArmor for a long time as a mandatory access control system. With SUSE Linux Micro (and other SLES 16-based products) we changed
      this to SELinux. This talk will show you the basics of how SELinux works and what to expect when you move from AppArmor to SELinux.
