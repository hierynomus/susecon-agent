  - id: "HOL-1436"
    title: Whats New in SUSE Linux Enterprise Server 16
    speaker: Zia Rehman
    abstract: >
      As the successor to the highly successful SLES 15 family, with SLES 16 we modernized the entire systems management stack to prioritize automation, remote accessibility, and integration with modern DevOps practices. The result is a Linux operating system designed to meet the next generation of IT challenges.

      This hands-on session first introduces you to Cockpit, the industry standard web-based, remote management console for modern Linux distributions. You will explore using Cockpit for easy remote management, viewing system state, logs, and performance in real-time, all from a web browser.

      SLES has transitioned to NetworkManager for configuring and managing networking. You will use NetworkManager to manage the network configuration.

      The most significant security update in SLES 16 is the transition from AppArmor to SELinux as the default Mandatory Access Control (MAC) framework. You will explore how SELinux offers the granular control required in high-security environments. SLES 16 ships with over 440 policy modules providing broad system coverage from day one.

      By the end of this session, you will understand the remote management capabilities of Cockpit, how to use NetworkManager, and how to use SELinux to provide mandatory access control as a key component in the SLES 16 security framework.
    track: Hands on Lab
    day: "Tuesday"
    date: "2026-04-21"
    time: "16:30"
    end_time: "18:30"
    room: Florenc 2
    length: 120
