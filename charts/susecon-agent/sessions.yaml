  - id: "OVERVIEW-1341"
    title: "Beyond the Chatbot: Transforming your IT with Open, Governed, AI-Assisted Infrastructure"
    speaker: "Sebastian Martinez Torregrosa, Daniel Rahn"
    abstract: >
      The IT mandate is clear: slash costs and mitigate risk while accelerating AI transformation. Yet, most organizations face an "Execution Gap," trapped between AI ambition and the need to "keep the lights on" with rigid infrastructure.

      Move beyond the hype of chatbots. Join this session to discover the roadmap and the possibilities opened by AI-assisted infrastructure, a strategic framework for an Open, Governed, and Integrated intelligent IT foundation. We will explore how to enable your current heterogeneous estate into a context-aware "AI" partner that can drive TCO reduction by boosting human knowledge with intelligent, correlated visibility.
      Discover SUSE's unique approach: AI-assisted infrastructure spanning from local Linux to the SAP environment and heterogeneous management at scale, ruled by a Human-in-the-Loop (HITL) safety model that ensures audit-proof compliance. Built on the open Model Context Protocol (MCP), it prevents vendor lock-in and enables seamless integration.
    track: Product Overview
    day: "Tuesday"
    date: "2026-04-21"
    time: "11:00"
    end_time: "11:30"
    room: Karlin 3
    length: 30
    tags: ["linux-systems-management", "ai"]

