  - id: "OVERVIEW-1282"
    title: "SUSE Telco Cloud: Addressing Diverse Telco Use Case Requirements"
    speaker: "Tim Irnich, Timo Jokiaho"
    abstract: >
      Kubernetes is the de-facto standard for container orchestration. While its design is driven by the need for scalable, fault-tolerant and declarative microservices deployment, it is also very suitable for telco network Control Plane Functions (CP) responsible for signaling, session/mobility management and subscriber authentication, since their needs and design is similar to web applications.

      User Plane Functions (UP), however, are responsible for forwarding user data traffic and hence significantly more coupled to the underlying physical hardware. Therefore, deploying the user plane on Kubernetes presents unique challenges that took some time to get properly addressed in Kubernetes, but also for these use cases Kubernetes offers significant flexibility and resource efficiency gains.
    track: Product Overview
    day: "Tuesday"
    date: "2026-04-21"
    time: "12:30"
    end_time: "13:00"
    room: Karlin 4
    length: 30
    tags: ["cloud-infrastructure"]

