  - id: "CUSTOMER-1364"
    title: Building Digital Sovereignty at the Extreme Edge with Modular Composable Services
    speaker: Merijn Weiss
    abstract: >
      Defence organisations operating in NATO-classified and mission-critical environments face extreme IT challenges: systems must remain secure, interoperable, and dependable at the Extreme Edge, even with limited connectivity and strict mission requirements. This session shows how a Modular Composable Services Architecture, built on SLE Micro, K3s, and SUSE Observability, delivers digital sovereignty and operational resilience in these demanding conditions.

      Although grounded in a real NATO-aligned defence deployment, the architectural principles and lessons are broadly applicable. Any organisation seeking sovereign, open, and compliant digital infrastructure can adopt the same foundations of modularity, immutability, and declarative automation. Attendees will leave with practical guidance for building reliable edge systems that remain consistent, secure, and predictable under high-assurance and constrained operating environments.
    track: Customer Experience
    day: "Tuesday"
    date: "2026-04-21"
    time: "11:45"
