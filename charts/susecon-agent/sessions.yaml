    abstract: >
      When it comes to managing comprehensive Linux infrastructure, SUSE Multi-Linux Manager is a very common utility. In comparison with other management suites, it not only supports SUSE Linux but also additional widespread Linux distributions and offers a simple way to administer systems efficiently. After being forked from Spacewalk in 2018, a modern communication and configuration stack based on SaltStack has been implemented. In recent releases, the project moved to a Container-based setup.

