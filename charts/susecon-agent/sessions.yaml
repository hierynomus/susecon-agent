  - id: "TUTORIAL-1067"
    title: "Layered AI Architecture with AWS, Denodo and SUSE"
    speaker: "David Rocha, Ted Jones"
    abstract: >
      This session presents a blueprint for engineering a robust, scalable, and secure layered AI architecture by synergistically combining AWS cloud services, the Denodo Logical Data Management platform, and SUSE AI solutions. We detail a modular architecture that strategically separates the data plane, the data integration layer, and the model execution environment to enhance agility, governance, and time-to-value for AI initiatives.

      The architecture leverages AWS for its foundational compute, storage (e.g., S3, EC2), and specialized AI/ML services (e.g., SageMaker, Bedrock). The critical data integration and abstraction layer is managed by Denodo, which virtualizes data across disparate, often siloed sources. Denodo provides a unified, secure, and real-time data view, crucial for feeding high-quality, up-to-date data to AI models without the latency and complexity of physical data replication.

      Completing the stack, SUSE AI provides the secure, reliable, and high-performance operating system and enterprise management for the entire AI lifecycle. This includes managing and scaling the underlying infrastructure—from hybrid cloud deployments to edge computing—using SUSE Linux Enterprise and SUSE Rancher Prime, and utilizing SUSE's specialized AI tools to streamline the deployment and management of model training and inference pipelines.

      Attendees will learn how this specific technology stack addresses common AI implementation challenges: data fragmentation, high latency in data access, security and compliance risks, and the portability of AI workloads. Key takeaways will include practical strategies for deploying model training and inference pipelines, optimizing data access for demanding AI workloads, and maintaining enterprise-grade security and stability across the entire AI/ML lifecycle.
