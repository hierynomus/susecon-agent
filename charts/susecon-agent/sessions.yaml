  - id: "TUTORIAL-1138"
    title: "The Green Blueprint: Architecting the Complete End-to-End SUSE Ecosystem"
    speaker: "Alejandro Bonilla, Joshua Crater"
    abstract: >
      Navigating the cloud-native landscape requires more than just a container engine; it requires a cohesive strategy that spans virtualization, management, security, and data. In this session, we provide a comprehensive, high-level technical tour of the full SUSE stack in action.

      We will trace the lifecycle of a deployment, starting from the infrastructure layer with Harvester and K3K, up through the cluster orchestration with Rancher Prime and RKE2. We will demonstrate how to layer on essential Day 2 operations using SUSE Security for zero-trust security and Longhorn for persistent storage. Finally, we will show how this unified foundation empowers next-generation workloads across SUSE Edge, Telco Cloud, and AI implementations. Join us to understand the "Big Picture" architecture and how to connect these powerful components into a single, resilient platform.
