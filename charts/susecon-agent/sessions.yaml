  - id: "CUSTOMER-1311"
    title: "Sylva & Cluster API: what works, what's next"
    speaker: Thomas Morin
    abstract: >
      In this talk, we'll present the Sylva project, focusing on our journey with Cluster API. We'll tell you about why we made it an architectural cornerstone of Sylva, and how it allowed us to build an opensource on-premise Kubernetes infrastructure stack, baremetal or virtualized.

      You'll also hear about Orange's field experience with such a Cluster API -based stack, and what we learned as end-users.

      If you discover Cluster API, you'll learn the basics, in particular how it is vendor-agnostic and infra-agnostic, but also how Cluster API let's us easily build clusters from scratch, with the same tooling that handles the management cluster lifecycle, that manages workload clusters, and no additional tool to do full end-to-end deployments in CI.

      The last part of the talk will be about where room for improvement lies: expected or desired evolutions in Cluster API, in operating systems used, or improvements in how Sylva uses Cluster API.
    track: Customer Experience
    day: "Tuesday"
    date: "2026-04-21"
    time: "14:00"
    end_time: "14:30"
    room: Karlin 4
    length: 30
    tags: ["kubernetes", "open-source"]

