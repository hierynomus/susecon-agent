  - id: "TUTORIAL-1063"
    title: MetalLB BGP Routing for SUSE Edge
    speaker: "Antonio Alonso Alarcon, Jonas Arndt"
    abstract: >
      Using MetalLB in layer 3 (a.k.a. BGP) mode was introduced as a tech preview in EDGE 3.4. It allows for your cluster nodes to establish BGP peering sessions with local network routers and can therefore advertise IPs of external cluster services. This can both increase robustness and limit spreading of packets across cluster nodes.

      In this interactive presentation and demo we will demonstrate how MetalLB BGP can be used to expose a simple cluster service. We will go through basic concepts for BGP, and how to set up FRR routers in containers to interact with the cluster nodes.

      We will also show how the loss of a node immediately affects the routing tables of the local allowing them to direct traffic to unaffected nodes where the service is still presence to prevent service outage.
