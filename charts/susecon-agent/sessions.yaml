  - id: "TUTORIAL-1110"
    title: "SUSE Virtual Clusters in Action: Simplifying Kubernetes Multi-Tenancy"
    speaker: "Enrico Candino, Hussein Galal"
    abstract: >
      Providing separate Kubernetes environments for multiple teams, developers, or customers can quickly become costly and complex. While namespaces offer basic separation, they fall short when it comes to strong isolation and governance—key requirements for true multi-tenancy.

      Enter SUSE Virtual Clusters, a virtual cluster solution built on K3s that reimagines how we can deliver isolated Kubernetes environments at scale. In this session, the project's maintainers will demonstrate how k3k creates lightweight, fully functional K3s clusters in two modes: Virtual Mode, where clusters run inside pods, and Shared Mode, where workloads run directly on the host for maximum efficiency.

      We'll also introduce Virtual Cluster Policies, a governance layer that enables administrators to define boundaries and control behavior across all tenant clusters—such as limiting node creation or managing network access.

      Join us to see how Virtual Clusters using k3k enables organizations to offer self-service Kubernetes environments that are fast to create, secure by design, and highly scalable—without the operational overhead of traditional clusters.
