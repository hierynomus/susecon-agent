  - id: "HOL-1435"
    title: Downstream Cluster Application Management Methods with SUSE Rancher Prime
    speaker: Pete Hakkarainen
    abstract: >
      With SUSE Rancher Prime it is possible to deploy and manage downstream cluster applications with multiple methods. The method to select depends on your needs. The simplest method is to tell the path of a container image to run. This is simple, you then need to configure the application manually for the storage location, service type and port etc.

      To allow the configuration during the application deployment, Helm can be used. To enable central management for the applications, Fleet and Git can be used for manifest repository.

      To bring security in the application management, SUSE Application Collection could be used. It currently contains well over 100 Kubernetes applications that are curated for known exploits, and as new vulnerabilities will be exposed, SUSE will publish new curated application artifacts as soon as possible.

      In this hands-on session the above application deployment methods will be introduced and used. Along with the application layer security SUSE Application Collection provides, additional container security aspects will be introduced with SUSE Security and Kubewarden.
    track: Hands on Lab
    day: "Tuesday"
    date: "2026-04-21"
    time: "13:45"
    end_time: "15:45"
    room: Karlin 1
    length: 120
    tags: []

  - id: "TUTORIAL-1168"
    title: Migrating from VMware to SUSE Virtualization
    speaker: "Alejandro Bonilla, Alessandro Pilotti"
    abstract: >
      Recent changes in VMware licensing are accelerating the demand for migrating existing workloads to other platforms, including SUSE Virtualization (Harvester), which is often adopted in similar on-premises scenarios with a significantly lower TCO. During this session we will discuss various migration strategies and introduce Coriolis, a VM migration as a service and DRaaS solution that fully automates lift-and-shift migrations in a scalable way for both Linux and Windows VMs. The session will also include a fully automated lift-and-shift and live demo from VMware to SUSE Virtualization using Coriolis.
