  - id: "CUSTOMER-1079"
    title: Sit. Stay. Deploy. Teaching a Robot Dog with SUSE AI
    speaker: Johan van Amersfoort
    abstract: >
      Ever wondered what the guiding dog of the future will look like? In this session, we'll show how SUSE AI and Rancher bring computer vision to life - enabling a real robot dog to recognize human gestures and perform actions in real time.

      Behind the fun is serious engineering: we'll walk through how models are trained, deployed, and served using SUSE AI. We'll also show low-latency edge components running on K3s, managed by Rancher.

      This session explores how edge AI, MLOps, and open infrastructure come together to make robotics smarter, faster, and easier to operate anywhere, from data center to device. It's a playful demonstration of what's possible when open source, AI, and SUSE meet at the edge and a practical look at building portable, GPU-accelerated inference pipelines for the real world.
