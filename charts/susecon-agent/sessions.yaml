  - id: "OVERVIEW-1119"
    title: "Beyond Backup: Disaster Recovery for SUSE Virtualization with CloudCasa and Rancher Prime"
    speaker: "Alejandro Bonilla, Pawel Staniec"
    abstract: >
      As organizations modernize their infrastructure, a simple backup is no longer enough. A comprehensive disaster recovery (DR) strategy for workloads on SUSE Harvester is a critical operational need. CloudCasa extends SUSE Rancher Prime and Harvester with enterprise-grade backup, restore, and application mobility for virtual machines, Kubernetes workloads, and persistent volumes—all through a single, unified interface.

      In this session, we'll show how CloudCasa integrates natively with SUSE environments to build a truly resilient infrastructure. We'll move beyond simple backups to demonstrate true DR capabilities, including automating cross-cluster recovery and recovering from a site-wide failure. You'll see how to protect Harvester VMs alongside containerized workloads, manage DR policies centrally from Rancher, and perform rapid recovery to new clusters or cloud environments.

      Attendees will gain hands-on insight into building and executing a robust DR plan for modern SUSE-based infrastructures with CloudCasa.

      Session Agenda:

      Introduction: Why Disaster Recovery Matters for Virtualized SUSE Workloads (Beyond Just Backup)

      Architecture Overview: Harvester + Rancher Prime + CloudCasa for High Availability and DR

      Live Demo 1: Protecting the Platform

      Configuring secure, policy-based backups for Harvester VMs and volumes.

      Performing granular, point-in-time restores.

      Live Demo 2: The Disaster Recovery Scenario

      Using Longhorn and CloudCasa for efficient, cross-cluster snapshot replication.

      Simulating a cluster failure and executing a full DR failover to a standby cluster.

      Live Demo 3: Application Mobility & Ransomware Recovery

      Migrating a complete application (VMs + persistent data) to a new environment.

      Restoring to a clean, immutable "golden snapshot" after a simulated ransomware event.

      Best Practices: Building Your DR Playbook (Policy Management, RPO/RTO, and Compliance)

      Q&A
