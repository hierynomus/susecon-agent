  - id: "TUTORIAL-1093"
    title: A Deep Dive into SUSE Rancher Cluster Provisioning
    speaker: "Silvio Moioli, Carlos Salas"
    abstract: >
      Ever wondered how Rancher actually creates clusters? Or heard of Cluster API but aren't sure how it fits into Rancher's architecture? This session takes you deep inside Rancher's provisioning engine, explaining how it's built on Cluster API (CAPI), an open-source project we actively contribute to and build upon. We'll show how Rancher consumes CAPI providers to provision and manage clusters, and dive into the architectural differences between Turtles and Provisioning v2. Attendees will gain a detailed understanding of Rancher's internal workflows, controller interactions, and how CAPI enables a unified and extensible provisioning model.
    track: "Technical Tutorial / \"How To\""
