  - id: "OVERVIEW-1169"
    title: "Scaling Kubernetes Beyond Boundaries: The Power of SUSE Virtual Clusters with K3k"
    speaker: "Rossella Sblendido, Jean-Phillipe Gouin"
    abstract: >
      As modern development teams continue to push the limits of multi-tenant Kubernetes environments, the need for lightweight, isolated, and flexible cluster solutions has never been greater. SUSE Virtual Clusters provides each tenant with what feels like a dedicated, full-fledged Kubernetes cluster, while sharing the underlying host cluster's compute resources.

      In this session, we'll dive deep into the architecture of our virtual clusters, explaining the core components and how they cooperate to deliver strong isolation with minimal overhead. We'll discuss the tradeoffs between full cluster independence and shared infrastructure efficiency, including performance considerations and the current limitations.

      Beyond the theory, we'll show real-world use cases that highlight how SUSE Virtual Clusters enable scalable testing environments, and secure multi-tenant platforms—all with minimal overhead.

      Finally, we'll share feedback from the Early Adopter Program and a sneak peek of the roadmap, including upcoming features aimed at improving cluster performance, developer experience, and ecosystem interoperability. Join us to explore how virtual clusters are redefining the way teams think about Kubernetes scalability and isolation.
    track: Product Overview
    day: "Tuesday"
    date: "2026-04-21"
    time: "14:00"
    end_time: "14:30"
    room: Palmovka 2
    length: 30
    tags: ["devops", "kubernetes"]

  - id: "CUSTOMER-1161"
    title: "Building automated internal Cloud at Aussie Broadband with SUSE Rancher Prime, Elemental, SUSE Virtualization, SUSE Edge and GitOps"
    speaker: "Andrew Hainsworth, Stefan Scharlott, David Grolimund"
    abstract: >
      Aussie Broadband (ABB) is building a highly automated, multi-site platform on bare metal using SUSE Rancher, SUSE Elemental, SUSE Edge, SUSE Harvester and GitOps tooling. In this session we'll show how we turned “click-ops” and spreadsheets into a fully automated lifecycle for clusters, VMs, and OS images – from a powered-off server in the rack to production-ready Kubernetes.

      We'll walk through how ABB uses NetBox as a source of truth, Rancher to manage RKE2 and Elemental clusters, and Gitea + Argo CD to drive end-to-end provisioning pipelines, backed by Portworx software-defined storage We'll dive into key patterns like declarative bare-metal onboarding with Elemental, automated bootstrapping, Git-driven OS image and cloud-init management, and GitOps driving application and VM deployments.
    track: Customer Experience
    day: "Tuesday"
    date: "2026-04-21"
    time: "14:00"
