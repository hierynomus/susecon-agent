    abstract: >
      In this session we share how ITS Umbria Academy implemented an AI-driven e-learning platform built on Laravel and powered end-to-end by SUSE AI Suite. Starting from static, hard-to-update materials, we delivered a interactive web application students interact with an AI Teacher which helps them in post-lecture learning. From the teacher side, the web app allows to automatically load, summarize and publish teaching material in the e-learning webpage. The dedicated GenAI chatbots for students and faculty are domain-constrained prompts, able to provide traceable citations and exposed via a simple course page and SSO access. We will walk through the target architecture, deployment choices, and how SUSE AI's Kubernetes foundation, security-by-design stack and GPU orchestration let us scale LLM workloads safely while keeping the Laravel monolith clean and maintainable. We close with lessons learned on governance, performance and how the same pattern can be reused for new courses and institutes.
