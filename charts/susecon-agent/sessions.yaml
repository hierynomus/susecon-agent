  - id: "OVERVIEW-1109"
    title: "Unleashing Cloud-Native Power: AmpereOne, SUSE Virtualization, and the Future of ARM Nested Virtualization"
    speaker: "Peter Pouliot, Alejandro Bonilla"
    abstract: >
      The transition to energy-efficient, high-density compute is accelerating, with the AmpereOne ARM-based server chip emerging as a key platform for next-generation cloud infrastructure. This session dives deep into the validated, cloud-native software stack built around SUSE Virtualization (Harvester) and SUSE Rancher, demonstrating how to achieve seamless, unified management of both Virtual Machines (VMs) and containers on Ampere's Arm64 architecture.

      Attendees will learn how this integrated solution leverages the inherent advantages of AmpereOne—single-threaded cores for predictable performance and industry-leading power efficiency—to create a modern, hyperconverged infrastructure (HCI).

      Crucially, we will explore a significant technical advancement in the underlying Linux kernel: the support for ARMv8.4 Nested Virtualization added in the Linux 6.12 kernel. This new capability is specifically enhanced with support for the FEAT_ATS1A (Address Translation) family of instructions. We will unpack the practical impact of this feature, which dramatically improves the efficiency and performance of nested virtual environments (L1 hypervisors running L2 guests), making complex use cases like development/testing environments, cloud-in-cloud scenarios, and microVMs economically viable on the AmpereOne platform.

      Join us to see how the combination of AmpereOne silicon and the SUSE cloud-native stack, fortified by cutting-edge kernel virtualization features, is setting the new standard for performance, efficiency, and scalability in the modern data center.
    track: Product Overview
    day: "Thursday"
    date: "2026-04-23"
    time: "11:45"
    end_time: "12:15"
    room: Karlin 2
    length: 30
    tags: ["cloud-infrastructure", "enterprise-linux"]

