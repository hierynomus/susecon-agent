      We will go over how at GE Healthcare, we created a singular pipeline in Gitlab that allows for the automatic configuration, building, testing, and deployment of SLES operating systems to various development teams using common dependencies between them. This has allowed for huge time-savings, resource consolidation, and money saved by having this pipeline. We now have a simple pipeline page the user can build can OS image to their specification.
