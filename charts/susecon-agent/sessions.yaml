    abstract: >
      Are you working to standardize certain layers of your architecture or do the opposite and ensure you don't put all your eggs in one basket to ensure business continuity. Many organizations are looking to consolidate vendors and making big bets on a single flavor of Linux, Kubernetes or public cloud. While others are taking a multi-cloud, multi-vendor approach. What are your top priorities and how can you make architectural decisions to align to your overall strategy? In this session, we will discuss the pros and cons of standardization versus diversification or “heterogenizing” your IT. Providing real-world examples, we will illustrate how the move to a more composable architecture allows us to align workloads to the right infrastructure. This is a vendor-agnostic presentation and will be focused on technology areas and trends, including how AI influences our architectural decisions.

