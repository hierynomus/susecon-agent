    speaker: "Bettina Bassermann, Torsten Hallmann"
    abstract: >
      The digital supply chain is a crucial element of every modern business, yet it is increasingly the target of complex cyberattacks. New, stricter regulations such as the EU Cyber Resilience Act (CRA) and the Network and Information Security Directive (NIS 2) challenge companies to achieve transparency in their software supply chains and manage risks effectively. Beyond compliance, these regulations underscore the growing need for digital sovereignty, ensuring organizations maintain control over their critical technology and data assets.

