  - id: "OVERVIEW-1372"
    title: "Zero Trust Infrastructure: Extend Security from the Software Supply Chain to the Execution Platform"
    speaker: "Sebastian Martinez Torregrosa, Knut Trepte"
    abstract: >
      Traditional Zero Trust models focus on "who" is accessing the network but ignore "what" is running. As regulations like NIS2 and the Cyber Resilience Act (CRA) introduce direct executive liability, implicit trust in your software provider and infrastructure is no longer an option.

      Join this session to discover Zero Trust Infrastructure (ZTI). We will demonstrate how to extend security beyond the perimeter by enforcing trust at two critical points: the Software Supply Chain (verifying origin via machine-verifiable SBOMs and EAL4+ certification) and the Execution Platform (protecting Datain-Use via Confidential Computing and Secure Enclaves verified preexecution).

      Learn how to replace "blind trust" with verifiable, cryptographic proof that ensures your workloads remain secure from build to runtime.
