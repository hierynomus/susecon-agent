  - id: "BUSINESS-1379"
    title: EU AI Regulations and SUSE ISV partnership in Action
    speaker: "Martina Ilieva, Sean Musch"
    abstract: >
      The EU AI Act is no longer theory—it's time for practical execution. Companies must now operationalize compliance to meet the European Commission's strict new requirements.
      In this session, the SUSE ISV partner, AI&Partners, will provide specific, actionable steps to help your organization stay ahead of the curve.

      We'll detail the shift required to integrate ethical AI principles and data protection into your development pipeline, ensuring compliance beyond the initial discussion phase.

      We'll also present a parallel analysis of developing AI regulations in South Korea, China, and the US, offering practical guidance for global compliance teams, and explore the impact of the open-source.

      We'll also share how SUSE AI product certifications and becoming a SUSE AI Ready ISV partner accelerated customer trust, leading to successful go-to-market activities and customer opportunities.
