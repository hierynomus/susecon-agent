  - id: "OVERVIEW-1156"
    title: The Next Evolution of Virtualization is Cloud-Native
    speaker: "Janet Wi, Alejandro Bonilla, Chris Crow"
    abstract: >
      "As enterprises look to modernize their virtualization environments, they face a critical challenge: how to balance cost control with innovation and operational resilience. In this session, we'll explore how leading organizations are rethinking virtualization to drive efficiency across their infrastructure.

      Learn how modern virtualization—built on a cloud-native foundation—enables you to streamline operations and reduce total cost of ownership from escalating license renewals.

      You'll also learn:

      Why now is the time to modernize your virtualization stack

      How SUSE and Portworx deliver enterprise-grade resilience and manageability at scale

      Common use cases and best practices for building a modern, unified app platform"
