  - id: "OVERVIEW-1151"
    title: SUSE Multi-Linux Manager Automation at scale
    speaker: "Ricardo Mateus, Johannes Hahn"
    abstract: >
      Managing distributed server landscapes at scale presents challenges in content consistency, configuration drift, and patch automation. This session explores the SUSE Manager 5.1 Hub Architecture as a centralized, scalable solution for content management and auto-update capabilities at scale.

      We will first provide an architectural overview of the Hub architecture. Learn how to leverage Content Lifecycle Management (CLM) for content curation and Hub Online Synchronization for automatic distribution across all peripheral locations.

      Recurrent actions execute scheduled updates at scale, shifting patching from reactive to proactive. Finally, we demonstrate how GitFS integration allows users to establish a reliable GitOps pipeline for SUSE Manager environments.
    track: Product Overview
    day: "Tuesday"
    date: "2026-04-21"
    time: "11:00"
    end_time: "11:30"
    room: Palmovka 1
    length: 30
    tags: ["linux-systems-management", "automation"]

  - id: "CUSTOMER-1415"
    title: Building a Full-Stack Enterprise Kubernetes Platform with the SUSE Rancher Suite
    speaker: "Cleber Paiva de Souza, Natã Mourão"
    abstract: >
      Managing enterprise Kubernetes environments demands integrated, secure management. This session presents a real-world case study on deploying a comprehensive Kubernetes platform with the full SUSE Rancher suite. We'll showcase how Rancher Manager orchestrates clusters, streamlines operations, and enforces granular RBAC. Longhorn provides resilient persistent storage; NeuVector secures containers with runtime protection, scanning, and microsegmentation. Rancher Fleet implements GitOps for automated, declarative deployment, ensuring consistency and auditability. Cert-Manager handles automated TLS; SUSE Observability provides centralized monitoring. Attendees will learn how these integrated SUSE technologies enhance security, compliance, agility, and availability, making Kubernetes management simpler, faster, and more reliable.
    track: Customer Experience
    day: "Tuesday"
    date: "2026-04-21"
    time: "11:00"
    end_time: "11:30"
    room: Palmovka 2
    length: 30
    tags: ["compliance"]

