  - id: "HOL-1430"
    title: Demystifying Networking Configuration in SUSE Virtualization
    speaker: Ron Terry
    abstract: >
      SUSE Virtualization supports a number of different mechanisms for configuring networking in the virtualization cluster. Terms like Cluster Network, Network Config, Virtual Private Cluster, VLAN, untagged network and VM network are encountered when trying to configure networking. If not properly understood in context it can be confusing what they mean and how they are used and configured in a SUSE Virtualization cluster.

      This hands-on session covers what all of these networking related terms and concepts mean and how they are used when configuring networking in a SUSE Virtualization cluster. You will work with scenarios such as how to configure networking when cluster nodes have differing NIC placement and how to add new cluster nodes into a cluster and configure their networking. You will also explore the new feature of Virtual Private Clusters (VPC), introduced in tech preview starting with SUSE Virtualization 1.6.x, and gain hands-on experience configuring VPC.

      By the end of the session attendees will have a good understanding of how to configure networking in a SUSE Virtualization cluster.
    track: Hands on Lab
    day: "Tuesday"
    date: "2026-04-21"
    time: "11:00"
    end_time: "13:00"
    room: Florenc 2
    length: 120
    tags: ["virtualization"]

  - id: "HOL-1432"
    title: "SUSE Linux Enterprise Server 16: Look, No Hands"
    speaker: Zia Rehman
    abstract: >
      Do you want to deploy nice shiny new SLES 16 systems while enjoying a cup of coffee? Automating the deployment of SLES 16 with Agama is the answer, but you still have to make the coffee yourself!

      In this hands-on session you will create an Agama profile that will be used to automate the installation of SLES 16. Once completed, simply power on the system and go and make that coffee, no human interaction required. “I have several different hardware specifications I need to deploy SLES 16 on” I hear you say. No problem, you will then create a dynamic profile that adapts to the hardware SLES is being installed on. Time for another coffee.
    track: Hands on Lab
    day: "Tuesday"
