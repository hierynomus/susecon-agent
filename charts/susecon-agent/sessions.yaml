    speaker: "Débora Noronha, Brendan Bulmer"
    abstract: >
      Digital Public Goods (DPGs) are foundational to accelerating the UN's 2030 Sustainable Development Goals. This session will detail the cross-functional effort that led to SUSE Linux Enterprise Server (SLES) becoming the first and only commercial Linux product to be recognized as a DPG by the UN-endorsed Digital Public Goods Alliance.

      We will explore the strict and independent process that validated SLES's adherence to the highest standards of privacy, security, open-source principles, and the crucial 'do no harm' criterion. This designation is a formal confirmation that SLES is a reliable building block for solving major global challenges, directly contributing to Sustainable Development Goal Nine: Industry, Innovation, and Infrastructure.

      Attendees will walk away understanding the strategic value of the DPG status, which gives assets credibility with customers, governments and funding institutions seeking proven, scalable solutions. They will also learn about how choosing SLES positions their own infrastructure to support global social good, sustainability, and digital sovereignty initiatives. Discover how SUSE's dedication to true open source is transforming technology into a force for sustainable development.
