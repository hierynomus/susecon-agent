    title: "Trust in Every Bit: How SUSE Linux Enterprise Server 16 Reproducible Builds Mitigate Supply Chain Risk"
    speaker: Bernhard M. Wiedemann
    abstract: >
      How do you prove that the software your organization runs (or ships to customers) has not been tampered with? In an era of sophisticated supply chain attacks, traditional security measures are insufficient. We must be able to trust the binaries themselves.

      This session explains how we achieved this "trust in every bit" for SUSE Linux Enterprise Server 16.0. As the main technical contributor to this initiative, I will detail the engineering efforts required to make an entire enterprise operating system "reproducible", capable of being rebuilt from source to produce bit-for-bit identical packages, every time.

      We will move quickly from the "what" (overcoming nondeterministic toolchains, build-time variables, etc.) to the "so what." This talk focuses on translating this technical milestone into a critical business and security strategy. You will learn how Reproducible Builds:

      * Directly Mitigate Supply Chain Risk

