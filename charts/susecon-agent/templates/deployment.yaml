apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "susecon-agent.fullname" . }}
  labels:
    {{- include "susecon-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "susecon-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "susecon-agent.selectorLabels" . | nindent 8 }}
      annotations:
        # Force redeployment when ConfigMap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: susecon-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/susecon-agent"]
          ports:
            - name: http
              containerPort: {{ .Values.agent.port }}
              protocol: TCP
          env:
            - name: BIND_ADDRESS
              value: "0.0.0.0:{{ .Values.agent.port }}"
            - name: BACKEND_URL
              value: "http://{{ include "susecon-agent.backendFullname" . }}:{{ .Values.backend.port }}"
            - name: BACKEND_TIMEOUT_SECS
              value: "{{ .Values.agent.backendTimeoutSeconds }}"
            - name: RUST_LOG
              value: "{{ .Values.config.logLevel }}"
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
